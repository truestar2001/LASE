seed: 42

model:
  # Easiest path: point this to a downloaded Spark-TTS checkpoint root.
  # The trainer will look for:
  #   ${pretrained_model_dir}/BiCodec/config.yaml
  #   ${pretrained_model_dir}/BiCodec/model.safetensors
  #   ${pretrained_model_dir}/wav2vec2-large-xlsr-53
  pretrained_model_dir: pretrained_models/Spark-TTS-0.5B
  use_codebook: true

  # Optional explicit overrides.
  config_path: null
  init_ckpt_path: null
  feature_extractor_path: null
  strict_load: false

data:
  train_manifest: /home/jyp/LASE/Spark-TTS/manifests/voxceleb2.json
  valid_manifest: null
  audio_key: audio_filepath
  base_dir: null
  volume_normalize: false
  segment_duration: 3.2
  ref_segment_duration: 3.0
  min_duration: 0.5
  max_duration: 30.0

feature_extractor:
  # This trainer keeps wav2vec2 frozen and uses the same hidden-state mix as inference.
  hidden_state_indices: [11, 14, 16]

loss:
  vq_distance_loss_type: l1
  waveform_l1_weight: 1.0
  feature_l1_weight: 0.0
  mel_weight: 45.0
  stft_weight: 1.0
  vq_weight: 1.0
  generator_mp_weight: 1.0
  generator_mrd_weight: 1.0
  feature_matching_mp_weight: 1.0
  feature_matching_mrd_weight: 1.0
  discriminator_mp_weight: 1.0
  discriminator_mrd_weight: 1.0
  mel_n_fft: 1024
  mel_hop_length: 256
  mel_n_mels: 80
  mel_f_min: 0
  mel_f_max: 8000
  stft_resolutions:
    - [1024, 256, 1024]
    - [2048, 512, 2048]
    - [512, 128, 512]

discriminator:
  periods: [2, 3, 5, 7, 11]
  fft_sizes: [2048, 1024, 512]

optim:
  lr: 0.0001
  min_lr: 0.00001
  betas: [0.9, 0.999]
  weight_decay: 0.0

disc_optim:
  lr: 0.0001
  min_lr: 0.00001
  betas: [0.9, 0.999]
  weight_decay: 0.0

trainer:
  output_dir: exp/bicodec
  device: null
  batch_size: 4
  eval_batch_size: 4
  num_workers: 4
  max_epochs: 10000000
  max_steps: 800000
  pretrain_mel_steps: 0
  grad_accum_steps: 1
  clip_grad_norm: 1.0
  use_amp: true
  log_every_steps: 10
  save_every_steps: 100000
  eval_every_steps: 10000
  resume_from: null
